<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous WebRTC Space</title>
    <style>
        body {
            background-color: #0b0b0f;
            color: #e2e2e9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #12121a;
            border: 1px solid #232334;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
        p { color: #76768e; font-size: 14px; margin-top: 0; }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: #1c1c27;
            color: #a855f7;
            border: 1px solid #a855f7;
            margin-bottom: 20px;
        }
        button {
            background: #a855f7;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
            width: 100%;
        }
        button:hover { background: #9333ea; }
        .links-area {
            margin-top: 20px;
            text-align: left;
            display: none;
        }
        .link-box {
            background: #0b0b0f;
            border: 1px solid #232334;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 10px;
            color: #c084fc;
        }
        video-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            border: 1px solid #232334;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>P2P Anon Space</h1>
    <p>Полностью анонимные WebRTC звонки без бэкенда</p>
    <div id="status" class="status-badge">Ожидание действий</div>

    <div id="setup-panel">
        <button id="create-btn">Создать приватную комнату</button>
    </div>

    <div id="links-panel" class="links-area">
        <label style="font-size: 12px; color: #76768e;">Ссылка для Собеседника:</label>
        <div id="peer-link" class="link-box"></div>
        
        <label style="font-size: 12px; color: #76768e;">Ссылка для Наблюдателя (Анонимный слушать):</label>
        <div id="observer-link" class="link-box"></div>
    </div>

    <div class="video-container">
        <video id="localVideo" autoplay playsinline muted style="display:none;"></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Инициализация твоей базы Firebase RTDB
    const firebaseConfig = { databaseURL: "https://anton-8628b-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const isObserver = urlParams.get('role') === 'observer';

    const myClientId = "client_" + crypto.randomUUID().substring(0, 8); // Идеально под лимит < 50 символов
    let peerConnection;
    let localStream;

    const rtcConfig = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    document.getElementById('create-btn').addEventListener('click', createRoom);

    // Точка входа
    if (roomId) {
        document.getElementById('setup-panel').style.display = 'none';
        if (isObserver) {
            initObserver();
        } else {
            initJoiner();
        }
    }

    // Сценарий 1: Создатель комнаты (Инициатор)
    async function createRoom() {
        const newRoomId = crypto.randomUUID();
        const roomRef = ref(db, 'rooms/' + newRoomId);

        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('status').innerText = "Комната создана. Ожидание подключения...";

        // Генерируем ссылки
        const baseLink = `${window.location.origin}${window.location.pathname}?room=${newRoomId}`;
        document.getElementById('peer-link').innerText = baseLink;
        document.getElementById('observer-link').innerText = `${baseLink}&role=observer`;
        document.getElementById('links-panel').style.display = 'block';

        // Запрашиваем медиа-поток (Загорится зеленый индикатор)
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = 'block';

        // Пишем в базу структуру, строго проходящую валидацию правил
        await set(roomRef, {
            status: "active",
            initiator: myClientId
        });

        initWebRTC(newRoomId, true);
    }

    // Сценарий 2: Второй собеседник (Joiner)
    async function initJoiner() {
        document.getElementById('status').innerText = "Подключение к разговору...";
        
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = 'block';

        await update(ref(db, `rooms/${roomId}`), { joiner: myClientId });
        initWebRTC(roomId, false);
    }

    // Сценарий 3: Анонимный посредник/слушатель (Observer)
    async function initObserver() {
        document.getElementById('status').innerText = "Режим прослушивания (Анонимно)";
        // ВНИМАНИЕ: Мы НЕ вызываем getUserMedia(). Зеленый индикатор на телефоне родителя/наблюдателя НЕ горит.
        
        await update(ref(db, `rooms/${roomId}`), { observer: myClientId });
        initWebRTC(roomId, false, true);
    }

    // Общая WebRTC логика
    function initWebRTC(id, isInitiator, isListener = false) {
        peerConnection = new RTCPeerConnection(rtcConfig);

        // Если не слушатель — добавляем свои треки для отправки
        if (!isListener && localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }

        // Поймали поток от удаленного пользователя — выводим на экран
        peerConnection.ontrack = (event) => {
            if (!document.getElementById('remoteVideo').srcObject) {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                document.getElementById('status').innerText = "Связь установлена";
            }
        };

        // Отправка ICE-кандидатов в Firebase (под лимит < 1000 символов)
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                const candidateId = "ice_" + crypto.randomUUID().substring(0, 8);
                set(ref(db, `rooms/${id}/iceCandidates/${myClientId}/${candidateId}`), JSON.stringify(event.candidate));
            }
        };

        const roomRef = ref(db, `rooms/${id}`);

        if (isInitiator) {
            // Инициатор создает Offer, когда видит, что кто-то зашел
            onValue(roomRef, async (snapshot) => {
                const data = snapshot.val();
                if (data && data.joiner && !data.sdpOffers?.[myClientId]) {
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    // Строка укладывается в валидацию правил < 5000 символов
                    set(ref(db, `rooms/${id}/sdpOffers/${myClientId}`), JSON.stringify(offer));
                }
            });
        } else {
            // Слушатель или Joiner ждут Offer от Инициатора
            onChildAdded(ref(db, `rooms/${id}/sdpOffers`), async (snapshot) => {
                const offer = JSON.parse(snapshot.val());
                if (snapshot.key !== myClientId) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                    if (!isListener) {
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        set(ref(db, `rooms/${id}/sdpOffers/${myClientId}`), JSON.stringify(answer));
                    }
                }
            });
        }

        // Слушаем чужие ICE-кандидаты
        onChildAdded(ref(db, `rooms/${id}/iceCandidates`), (snapshot) => {
            if (snapshot.key !== myClientId) {
                onChildAdded(ref(db, `rooms/${id}/iceCandidates/${snapshot.key}`), (candSnapshot) => {
                    const candidate = JSON.parse(candSnapshot.val());
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
                });
            }
        });
    }
</script>
</body>
</html>
